{% extends 'layout/base.html' %}

{% block page_title %}Delete Student{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h4 class="card-title mb-4">Delete Student</h4>
        <p>Are you sure you want to delete <strong>{{ student.name }}</strong> ({{ student.register_number }})?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'admin_students' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
