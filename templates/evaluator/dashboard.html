{% extends 'layout/base.html' %}

{% block page_title %}Evaluator Dashboard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card stat-card">
            <div class="card-body">
                <h6 class="text-muted">Pending Assessments</h6>
                <h2 class="mb-0">{{ pending_assessments }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card stat-card">
            <div class="card-body">
                <h6 class="text-muted">Total Assessments</h6>
                <h2 class="mb-0">{{ total_assessments }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h6>Quick Actions</h6>
            </div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-6">
                        <a href="{% url 'evaluator_pending_assessments' %}" class="btn btn-primary w-100">
                            <i class="fas fa-tasks"></i> Pending Assessments
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="{% url 'evaluator_history' %}" class="btn btn-info w-100">
                            <i class="fas fa-history"></i> Assessment History
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
