{% extends 'layout/base.html' %}

{% block page_title %}Mentor Dashboard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card stat-card">
            <div class="card-body">
                <h6 class="text-muted">Assigned Students</h6>
                <h2 class="mb-0">{{ total_students }}</h2>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card stat-card">
            <div class="card-body">
                <h6 class="text-muted">Pending Verification</h6>
                <h2 class="mb-0">{{ pending_verifications }}</h2>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h6>Quick Actions</h6>
            </div>
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-6">
                        <a href="{% url 'mentor_assigned_students' %}" class="btn btn-primary w-100">
                            <i class="fas fa-users"></i> My Students
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="{% url 'mentor_pending_verification' %}" class="btn btn-warning w-100">
                            <i class="fas fa-clock"></i> Pending Verification
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="{% url 'mentor_all_internships' %}" class="btn btn-info w-100">
                            <i class="fas fa-briefcase"></i> All Internships
                        </a>
                    </div>
                    <div class="col-6">
                        <a href="{% url 'profile' %}" class="btn btn-success w-100">
                            <i class="fas fa-user"></i> My Profile
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
